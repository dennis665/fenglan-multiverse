{% load i18n %}

<footer class="bg-dark text-white-50 py-3 mt-5 border-top border-secondary">
    <div class="container d-flex flex-column flex-lg-row justify-content-between align-items-center">

        <div class="small mb-2 mb-lg-0">
            &copy; {% now "Y" %} CSI Portal. {% trans "All Rights Reserved." %} {# 版權所有聲明 #}
        </div>

        <div class="stats-box small">
            <span class="me-3">
                <i class="fas fa-user-clock me-1 text-info"></i>{% trans "Daily Visits" %}：
                <strong class="text-white">{{ today_count }}</strong> {# 今日瀏覽量 #}
            </span>
            <span>
                <i class="fas fa-globe me-1 text-success"></i>{% trans "Total Visits" %}：
                <strong class="text-white">{{ total_count }}</strong> {# 總瀏覽量 #}
            </span>
        </div>

    </div>
</footer>
