<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帳號綁定 - 行程小幫手</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- LINE LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            width: 100%;
            max-width: 450px;
        }
        .btn-line {
            background-color: #1DB446;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-line:hover {
            background-color: #158b32;
            color: white;
            transform: translateY(-2px);
        }
        .form-control {
            border-radius: 10px;
        }
    </style>
</head>
<body class="py-4">
    <div class="container d-flex justify-content-center">
        <div class="glass-card p-4">
            <h4 class="fw-bold mb-3 text-center text-success"><i class="fa-solid fa-link me-2"></i>帳號安全性綁定</h4>
            <p class="text-muted text-center small mb-4">為了保護您的行程隱私，請將您的 LINE 帳號與 CSI Portal 帳號進行安全性連結。</p>

            <form id="bind-form">
                <!-- 帳號 -->
                <div class="mb-3">
                    <label for="username" class="form-label fw-bold">CSI 系統帳號</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fa-regular fa-user text-muted"></i></span>
                        <input type="text" class="form-control border-start-0" id="username" placeholder="請輸入使用者名稱" required>
                    </div>
                </div>

                <!-- 密碼 -->
                <div class="mb-4">
                    <label for="password" class="form-label fw-bold">系統密碼</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fa-solid fa-lock text-muted"></i></span>
                        <input type="password" class="form-control border-start-0" id="password" placeholder="請輸入密碼" required>
                    </div>
                </div>

                <!-- 登入綁定按鈕 -->
                <button type="submit" class="btn btn-line w-100 mb-3 py-2"><i class="fa-solid fa-link-slash me-2"></i>登入並完成安全綁定</button>
            </form>

            <div class="text-center text-muted mb-3">—— 或 ——</div>

            <!-- 一鍵註冊新帳號 -->
            <button id="auto-register-btn" class="btn btn-outline-success w-100 py-2 mb-3" style="border-radius: 50px;">
                <i class="fa-solid fa-user-plus me-2"></i>一鍵建立新帳號並綁定
            </button>

            <!-- 以 Google 帳號合併綁定 -->
            <button id="google-bind-btn" class="btn btn-outline-danger w-100 py-2" style="border-radius: 50px; border-color: #ea4335; color: #ea4335;">
                <i class="fa-brands fa-google me-2"></i>使用網站 Google 帳號合併綁定
            </button>
        </div>
    </div>

    <script>
        let liffId = "{{ liff_id }}";
        let userAccessToken = null;
        let lineContext = null;

        // 從 URL 取得 groupId
        const urlParams = new URLSearchParams(window.location.search);
        const urlGroupId = urlParams.get("groupId");

        document.addEventListener("DOMContentLoaded", function() {
            initLiff();
        });

        function initLiff() {
            liff.init({ liffId: liffId })
                .then(() => {
                    if (liff.isLoggedIn()) {
                        userAccessToken = liff.getAccessToken();
                        lineContext = liff.getContext();

                        // 檢查是否有待執行的 Google 帳號綁定動作 (優先自 localStorage 讀取以防重導向遺失參數)
                        const pendingAction = localStorage.getItem("pending_action") || urlParams.get("action");
                        if (pendingAction === "google_bind") {
                            localStorage.removeItem("pending_action"); // 立即清除防止重複觸發
                            bindCurrentUser();
                        }
                    } else {
                        liff.login();
                    }
                })
                .catch((err) => {
                    console.error("LIFF failed to initialize", err);
                });
        }

        // 綁定當前 Session 用戶 (Google 登入用戶)
        function bindCurrentUser() {
            fetch("/line/api/bind/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    access_token: userAccessToken,
                    action: "bind_current_user",
                    group_id: urlGroupId || (lineContext ? lineContext.groupId : null)
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    Swal.fire('錯誤', "Google 帳號合併綁定失敗: " + data.error, 'error');
                } else {
                    Swal.fire({
                        title: '成功',
                        text: 'Google 帳號合併與歷史行程移轉成功！',
                        icon: 'success',
                        confirmButtonColor: '#1DB446',
                        confirmButtonText: '確定'
                    }).then(() => {
                        redirectToList();
                    });
                }
            })
            .catch(err => {
                console.error("Google bind error:", err);
                Swal.fire('錯誤', "伺服器連線失敗", 'error');
            });
        }

        // 處理帳密綁定
        document.getElementById("bind-form").addEventListener("submit", function(e) {
            e.preventDefault();

            if (!userAccessToken) {
                Swal.fire('未授權', 'LINE 未授權，請重試', 'warning');
                return;
            }

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;

            fetch("/line/api/bind/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    access_token: userAccessToken,
                    action: "bind",
                    username: username,
                    password: password,
                    group_id: urlGroupId || (lineContext ? lineContext.groupId : null)
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    Swal.fire('錯誤', "綁定失敗: " + data.error, 'error');
                } else {
                    Swal.fire({
                        title: '成功',
                        text: '帳號安全綁定成功！',
                        icon: 'success',
                        confirmButtonColor: '#1DB446',
                        confirmButtonText: '確定'
                    }).then(() => {
                        redirectToList();
                    });
                }
            })
            .catch(err => {
                console.error("Bind error:", err);
                Swal.fire('錯誤', "伺服器連線失敗", 'error');
            });
        });

        // 處理一鍵自動註冊
        document.getElementById("auto-register-btn").addEventListener("click", function() {
            if (!userAccessToken) {
                Swal.fire('未授權', 'LINE 未授權，請重試', 'warning');
                return;
            }

            Swal.fire({
                title: '建立專屬帳號',
                text: '系統將會為您建立一個專屬的 LINE 登入帳號，確定要繼續嗎？',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#1DB446',
                cancelButtonColor: '#6c757d',
                confirmButtonText: '確定',
                cancelButtonText: '取消'
            }).then((result) => {
                if (result.isConfirmed) {
                    fetch("/line/api/bind/", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            access_token: userAccessToken,
                            action: "auto_register",
                            group_id: urlGroupId || (lineContext ? lineContext.groupId : null)
                        })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.error) {
                            Swal.fire('錯誤', "一鍵建立帳號失敗: " + data.error, 'error');
                        } else {
                            Swal.fire({
                                title: '成功',
                                text: '專屬帳號建立並綁定成功！',
                                icon: 'success',
                                confirmButtonColor: '#1DB446',
                                confirmButtonText: '確定'
                            }).then(() => {
                                redirectToList();
                            });
                        }
                    })
                    .catch(err => {
                        console.error("Auto register error:", err);
                        Swal.fire('錯誤', "伺服器連線失敗", 'error');
                    });
                }
            });
        });

        function redirectToList() {
            const groupId = urlGroupId || (lineContext ? lineContext.groupId : null);
            let listUrl = `/line/liff/`;
            if (groupId) {
                listUrl += `?groupId=${groupId}`;
            }
            window.location.href = listUrl;
        }

        // Google 登入綁定按鈕監聽
        document.getElementById("google-bind-btn").addEventListener("click", function() {
            const groupId = urlGroupId || (lineContext ? lineContext.groupId : null);
            let nextUrl = `/line/liff/bind/?action=google_bind`;
            if (groupId) {
                nextUrl += `&groupId=${groupId}`;
            }
            
            // 由於 Google 安全政策阻擋 LINE 內嵌 WebView 瀏覽器 (disallowed_useragent)，
            // 我們必須使用 LIFF SDK 強迫將 Google 登入連結用「外部系統瀏覽器 (Safari/Chrome)」開啟
            const absoluteNextUrl = window.location.origin + nextUrl;
            const googleLoginUrl = window.location.origin + `/accounts/google/login/?process=connect&next=${encodeURIComponent(absoluteNextUrl)}`;
            
            // 儲存狀態至 localStorage，跨越 Google 與 LINE 登入多次重導向依然有效
            localStorage.setItem("pending_action", "google_bind");

            if (liff.isInClient()) {
                liff.openWindow({
                    url: googleLoginUrl,
                    external: true
                });
            } else {
                // 如果本來就在外部瀏覽器，直接重導向
                window.location.href = googleLoginUrl;
            }
        });
    </script>
</body>
</html>
