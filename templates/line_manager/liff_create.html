<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增行程 - 行程小幫手</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- LINE LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        .btn-line {
            background-color: #1DB446;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-line:hover {
            background-color: #158b32;
            color: white;
            transform: translateY(-2px);
        }
        .form-control, .form-select {
            border-radius: 10px;
            border: 1px solid #ccc;
        }
        .form-control:focus, .form-select:focus {
            border-color: #1DB446;
            box-shadow: 0 0 0 0.2rem rgba(29, 180, 70, 0.25);
        }
    </style>
</head>
<body class="py-4">
    <div class="container" style="max-width: 500px;">
        <div class="glass-card p-4">
            <h4 class="fw-bold mb-4 text-center text-success" id="form-title"><i class="fa-solid fa-calendar-plus me-2"></i>安排新行程</h4>
            
            <form id="create-form">
                <!-- 標題 -->
                <div class="mb-3">
                    <label for="title" class="form-label fw-bold">行程名稱 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="title" placeholder="如：與好友吃拉麵、密室逃脫" required>
                </div>

                <!-- 活動類型 -->
                <div class="mb-3">
                    <label for="activity_type" class="form-label fw-bold">活動類型</label>
                    <select class="form-select" id="activity_type">
                        <option value="EAT">🍴 吃飯聚餐</option>
                        <option value="EXHIBIT">🎨 逛街展覽</option>
                        <option value="SPORT">🏸 運動健身</option>
                        <option value="TRAVEL">🚗 旅遊踏青</option>
                        <option value="MOVIE">🎬 看電影</option>
                        <option value="OTHER" selected>🌟 其他活動</option>
                    </select>
                </div>

                <!-- 時間 -->
                <div class="mb-3">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label for="date_time" class="form-label fw-bold mb-0">行程時間 <span class="text-danger" id="time-required-star">*</span></label>
                        <div class="form-check form-switch mb-0">
                            <input class="form-check-input" type="checkbox" id="is_unscheduled" onchange="toggleTimeUnscheduled()">
                            <label class="form-check-label small fw-bold text-success" for="is_unscheduled">時間未定 (有興趣活動)</label>
                        </div>
                    </div>
                    <input type="datetime-local" class="form-control" id="date_time" required>
                </div>

                <!-- 地點 -->
                <div class="mb-3">
                    <label for="location" class="form-label fw-bold">活動地點</label>
                    <div class="input-group">
                        <input type="text" class="form-control" id="location" placeholder="如：捷運中山站、台北小巨蛋">
                        <button class="btn btn-outline-success" type="button" id="geo-btn" onclick="saveFormAndSelectLocation()">
                            <i class="fa-solid fa-location-crosshairs"></i> 定位
                        </button>
                    </div>
                </div>

                <!-- 相關活動連結 -->
                <div class="mb-3">
                    <label class="form-label fw-bold d-flex justify-content-between align-items-center">
                        <span>相關活動連結</span>
                        <button type="button" class="btn btn-xs btn-outline-success py-1 px-2 rounded-pill fw-bold" style="font-size: 0.75rem;" onclick="addRelatedLinkRow()">
                            <i class="fa-solid fa-plus me-1"></i>新增連結
                        </button>
                    </label>
                    <div id="links-container" class="d-flex flex-column gap-2">
                        <!-- 動態連結行 -->
                    </div>
                </div>

                <!-- 提前通知時間 -->
                <div class="mb-3">
                    <label for="notify_minutes_before" class="form-label fw-bold">提前通知時間</label>
                    <select class="form-select" id="notify_minutes_before">
                        <option value="0">行程開始時通知</option>
                        <option value="10">10 分鐘前</option>
                        <option value="30">30 分鐘前</option>
                        <option value="60">1 小時前</option>
                        <option value="120">2 小時前</option>
                        <option value="180">3 小時前</option>
                        <option value="360">6 小時前</option>
                        <option value="720">12 小時前</option>
                        <option value="1440" selected>1 天前 (24 小時)</option>
                        <option value="2880">2 天前</option>
                        <option value="4320">3 天前</option>
                        <option value="10080">1 週前</option>
                    </select>
                </div>

                <!-- 備註說明 -->
                <div class="mb-4">
                    <label for="notes" class="form-label fw-bold">備註說明</label>
                    <textarea class="form-control" id="notes" rows="3" placeholder="如：記得帶錢包、每人預算 500 元..."></textarea>
                </div>

                <!-- 按鈕 -->
                <div class="d-flex gap-3">
                    <button type="button" class="btn btn-outline-secondary w-50" style="border-radius: 50px;" onclick="history.back()">取消</button>
                    <button type="submit" class="btn btn-line w-50" id="submit-btn">確認排定</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let liffId = "{{ liff_id }}";
        let userAccessToken = null;
        let lineContext = null;

        // 從 URL 抓取 groupId 與 editId
        const urlParams = new URLSearchParams(window.location.search);
        const urlGroupId = urlParams.get("groupId");
        const urlEditId = urlParams.get("editId");

        document.addEventListener("DOMContentLoaded", function() {
            initLiff();
            
            // 如果是修改模式，移除定位按鈕以避免傳送定位後點卡片重新建立行程
            if (urlEditId) {
                const geoBtn = document.getElementById("geo-btn");
                if (geoBtn) {
                    geoBtn.remove();
                }
            }
            
            const urlLocation = urlParams.get("location");
            
            if (urlLocation) {
                // 填入定位地址
                document.getElementById("location").value = urlLocation;
                
                // 嘗試恢復暫存的行程內容
                const tempStr = localStorage.getItem("temp_itinerary");
                if (tempStr) {
                    try {
                        const temp = JSON.parse(tempStr);
                        document.getElementById("title").value = temp.title || "";
                        document.getElementById("activity_type").value = temp.activity_type || "OTHER";
                        if (temp.is_unscheduled) {
                            document.getElementById("is_unscheduled").checked = true;
                            toggleTimeUnscheduled();
                        } else {
                            document.getElementById("is_unscheduled").checked = false;
                            toggleTimeUnscheduled();
                            document.getElementById("date_time").value = temp.date_time || "";
                        }
                        document.getElementById("notify_minutes_before").value = temp.notify_minutes_before || "1440";
                        document.getElementById("notes").value = temp.notes || "";
                        
                        // 恢復連結
                        if (temp.related_links) {
                            temp.related_links.forEach(link => addRelatedLinkRow(link.title, link.url));
                        }
                    } catch (e) {
                        console.error("Failed to parse temp itinerary", e);
                    } finally {
                        localStorage.removeItem("temp_itinerary");
                    }
                }
            } else {
                // 如果不是定位返回，清除舊的暫存，並做新增時的時間初始化
                localStorage.removeItem("temp_itinerary");
                
                if (!urlEditId) {
                    const dtInput = document.getElementById("date_time");
                    const now = new Date();
                    now.setHours(now.getHours() + 1);
                    now.setMinutes(0);
                    
                    const year = now.getFullYear();
                    const month = String(now.getMonth() + 1).padStart(2, '0');
                    const day = String(now.getDate()).padStart(2, '0');
                    const hours = String(now.getHours()).padStart(2, '0');
                    const minutes = String(now.getMinutes()).padStart(2, '0');
                    dtInput.value = `${year}-${month}-${day}T${hours}:${minutes}`;
                }
            }
        });

        // 相關活動連結動態 rows 控制
        function addRelatedLinkRow(title = "", url = "") {
            const container = document.getElementById("links-container");
            const row = document.createElement("div");
            row.className = "input-group link-row";
            row.innerHTML = `
                <input type="text" class="form-control form-control-sm link-title" placeholder="標題 (如:官網)" value="${title}" style="max-width: 120px;">
                <input type="url" class="form-control form-control-sm link-url" placeholder="網址 (https://...)" value="${url}">
                <button class="btn btn-sm btn-outline-danger" type="button" onclick="this.closest('.link-row').remove()">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
            `;
            container.appendChild(row);
        }

        function getRelatedLinksData() {
            const rows = document.querySelectorAll(".link-row");
            const links = [];
            rows.forEach(row => {
                const title = row.querySelector(".link-title").value.trim();
                const url = row.querySelector(".link-url").value.trim();
                if (title && url) {
                    links.push({ title, url });
                }
            });
            return links;
        }

        // 時間未定切換控制器
        function toggleTimeUnscheduled() {
            const isUnscheduled = document.getElementById("is_unscheduled").checked;
            const dtInput = document.getElementById("date_time");
            const star = document.getElementById("time-required-star");
            
            if (isUnscheduled) {
                dtInput.disabled = true;
                dtInput.required = false;
                dtInput.value = "";
                if (star) star.style.display = "none";
            } else {
                dtInput.disabled = false;
                dtInput.required = true;
                if (star) star.style.display = "inline";
                
                // 預設為一小時後
                const now = new Date();
                now.setHours(now.getHours() + 1);
                now.setMinutes(0);
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                dtInput.value = `${year}-${month}-${day}T${hours}:${minutes}`;
            }
        }

        function initLiff() {
            liff.init({ liffId: liffId })
                .then(() => {
                    if (liff.isLoggedIn()) {
                        userAccessToken = liff.getAccessToken();
                        lineContext = liff.getContext();

                        // 如果是修改模式，則在載入時先拉取行程詳細資料預填
                        if (urlEditId) {
                            fetchItineraryDetail(urlEditId);
                        }
                    } else {
                        liff.login();
                    }
                })
                .catch((err) => {
                    console.error("LIFF failed to initialize", err);
                });
        }

        function fetchItineraryDetail(id) {
            fetch(`/line/api/itineraries/detail/${id}/`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    access_token: userAccessToken
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    // 動態切換為修改標題與按鈕
                    document.getElementById("form-title").innerHTML = `<i class="fa-solid fa-pen-to-square me-2"></i>修改行程`;
                    document.getElementById("submit-btn").innerText = "確認修改";
                    document.title = "修改行程 - 行程小幫手";

                    // 預填表單欄位
                    document.getElementById("title").value = data.title;
                    document.getElementById("activity_type").value = data.activity_type;
                    
                    if (!data.date_time) {
                        document.getElementById("is_unscheduled").checked = true;
                        toggleTimeUnscheduled();
                    } else {
                        document.getElementById("date_time").value = data.date_time;
                    }
                    
                    document.getElementById("location").value = data.location;
                    document.getElementById("notify_minutes_before").value = data.notify_minutes_before;
                    document.getElementById("notes").value = data.notes;

                    // 載入相關連結
                    if (data.related_links && data.related_links.length > 0) {
                        data.related_links.forEach(link => {
                            addRelatedLinkRow(link.title, link.url);
                        });
                    }

                    if (data.is_expired) {
                        Swal.fire({
                            title: '提醒',
                            text: '此行程已開始或已過期，無法再進行修改。',
                            icon: 'warning',
                            confirmButtonColor: '#1DB446',
                            confirmButtonText: '確定'
                        }).then(() => {
                            document.getElementById("submit-btn").disabled = true;
                        });
                    }
                } else {
                    Swal.fire('錯誤', '載入行程失敗: ' + data.error, 'error');
                }
            })
            .catch(err => {
                console.error("Fetch detail error:", err);
                Swal.fire('錯誤', '伺服器連線失敗', 'error');
            });
        }

        document.getElementById("create-form").addEventListener("submit", function(e) {
            e.preventDefault();

            if (!userAccessToken) {
                Swal.fire('未授權', 'LINE 帳號未授權，無法進行此操作', 'warning');
                return;
            }

            const title = document.getElementById("title").value.trim();
            const activity_type = document.getElementById("activity_type").value;
            const isUnscheduled = document.getElementById("is_unscheduled").checked;
            const date_time = document.getElementById("date_time").value;
            const location = document.getElementById("location").value.trim();
            const notify_minutes_before = document.getElementById("notify_minutes_before").value;
            const notes = document.getElementById("notes").value.trim();
            const related_links = getRelatedLinksData();

            const groupId = urlGroupId || (lineContext ? lineContext.groupId : null);

            // 根據是否為修改模式，切換呼叫的 API 端點
            const apiUrl = urlEditId ? `/line/api/itineraries/update/${urlEditId}/` : "/line/api/itineraries/create/";

            fetch(apiUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    access_token: userAccessToken,
                    group_id: groupId,
                    title: title,
                    activity_type: activity_type,
                    date_time: isUnscheduled ? "" : date_time,
                    location: location,
                    notify_minutes_before: notify_minutes_before,
                    notes: notes,
                    related_links: related_links
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    Swal.fire({
                        title: '成功',
                        text: urlEditId ? '行程修改成功！' : '行程安排成功！',
                        icon: 'success',
                        confirmButtonColor: '#1DB446',
                        confirmButtonText: '確定'
                    }).then(() => {
                        let listUrl = `/line/liff/`;
                        if (groupId) {
                            listUrl += `?groupId=${groupId}`;
                        }
                        window.location.href = listUrl;
                    });
                } else {
                    Swal.fire('錯誤', '操作失敗: ' + data.error, 'error');
                }
            });
        });

        function saveFormAndSelectLocation() {
            const formData = {
                title: document.getElementById("title").value.trim(),
                activity_type: document.getElementById("activity_type").value,
                date_time: document.getElementById("date_time").value,
                is_unscheduled: document.getElementById("is_unscheduled").checked,
                notify_minutes_before: document.getElementById("notify_minutes_before").value,
                notes: document.getElementById("notes").value.trim(),
                related_links: getRelatedLinksData()
            };
            localStorage.setItem("temp_itinerary", JSON.stringify(formData));
            
            Swal.fire({
                title: '引導定位分享',
                html: '請依照以下步驟進行定位分享：<br><br>' +
                      '1. 點擊下方確認按鈕<b>關閉本網頁</b>返回聊天室。<br>' +
                      '2. LINE 機器人會即時發送定位教學提醒訊息。<br>' +
                      '3. 選擇 <b>「位置資訊」</b> 選取地點並傳送。<br>' +
                      '4. 傳送後點擊新出現的卡片按鈕，即可自動帶回所有資料！',
                icon: 'info',
                confirmButtonColor: '#1DB446',
                confirmButtonText: '確定關閉並定位'
            }).then((result) => {
                if (result.isConfirmed) {
                    const groupId = urlGroupId || (lineContext ? lineContext.groupId : null);
                    
                    Swal.fire({
                        title: '發送引導中...',
                        allowOutsideClick: false,
                        didOpen: () => {
                            Swal.showLoading();
                        }
                    });

                    fetch("/line/api/itineraries/send_guide/", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            access_token: userAccessToken,
                            group_id: groupId
                        })
                    })
                    .then(res => res.json())
                    .then(data => {
                        Swal.close();
                        if (typeof liff !== 'undefined' && liff.isInClient()) {
                            liff.closeWindow();
                        } else {
                            Swal.fire('提示', '非 LINE App 環境，已將資料暫存並嘗試發送引導。', 'info');
                        }
                    })
                    .catch(err => {
                        console.error("Send guide error:", err);
                        Swal.close();
                        if (typeof liff !== 'undefined' && liff.isInClient()) {
                            liff.closeWindow();
                        } else {
                            Swal.fire('提示', '非 LINE App 環境，已將資料暫存。', 'info');
                        }
                    });
                }
            });
        }
    </script>
</body>
</html>
