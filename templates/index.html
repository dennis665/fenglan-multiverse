{% extends "base.html" %}

{% block head_title %}首頁 - CSI Portal{% endblock %}

{% block content %}
<div class="container text-center mt-5">
    <div class="p-5 mb-4 bg-light rounded-3 shadow-sm">
        <h1 class="display-4">歡迎來到 CSI Server Portal</h1>
        <p class="lead">這是一個使用 Django 6.0 與 Google OAuth 構建的系統。</p>
        <hr class="my-4">
        
        {% if user.is_authenticated %}
            <div class="alert alert-success">
                您好，<strong>{{ user.username }}</strong>！您已成功登入。
            </div>
            <a class="btn btn-primary btn-lg" href="{% url 'account_logout' %}" role="button">立即登出</a>
        {% else %}
            <p>請先登入以使用完整功能。</p>
            <a class="btn btn-primary btn-lg" href="{% url 'account_login' %}" role="button">前往登入頁面</a>
        {% endif %}
    </div>
</div>
{% endblock %}
