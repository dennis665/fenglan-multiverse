{% extends "base.html" %}
{% load i18n %}
{% load socialaccount %}

{% block head_title %}{% trans "Sign In" %}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <i class="fab fa-google fa-3x text-danger"></i>
                    </div>
                    
                    <h3 class="mb-3">使用 Google 帳號登入</h3>
                    
                    <p class="text-muted mb-4">
                        您即將使用 Google 帳號進行驗證。系統將導向 Google 授權頁面，請確認是否繼續？
                    </p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">
                                {% trans "Continue" %}
                            </button>
                            <a href="{% url 'account_login' %}" class="btn btn-link text-secondary">
                                取消回登入頁
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
