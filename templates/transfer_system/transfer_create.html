{# templates/transfer_system/transfer_create.html #}
{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="transfer-container shadow-lg p-5 rounded-4 bg-white mx-auto mt-5" style="max-width: 500px;">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary fw-bold mb-0">
            <i class="fas fa-exchange-alt me-2"></i>{% trans "發起轉移" %}
        </h2>
        <a href="{% url 'transfer_history' %}" class="btn btn-outline-secondary btn-sm rounded-pill px-3 shadow-sm">
            <i class="fas fa-list me-1"></i>{% trans "歷史清單" %}
        </a>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group mb-4">
            <label class="form-label fw-semibold text-secondary mb-2">{% trans "選擇物品" %}</label>
            <select name="item_id" id="item-select" class="form-select searchable-select" required>
                <option value="">{% trans "請輸入或選擇物品..." %}</option>
                {% for item in items %}
                    {# 將物品擁有者的 ID 寫入 data 屬性，供 JavaScript 讀取 #}
                    <option value="{{ item.id }}" data-owner-id="{{ item.owner.id }}">{{ item.name }} ({{ item.owner.username }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group mb-4">
            <label class="form-label fw-semibold text-secondary mb-2">{% trans "選擇接收者" %}</label>
            <select name="receiver_id" id="receiver-select" class="form-select searchable-select" required>
                <option value="">{% trans "請輸入或選擇使用者..." %}</option>
                {% for user in users %}
                    <option value="{{ user.id }}">{{ user.username }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="d-grid mt-5">
            <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">
                <i class="fas fa-paper-plane me-2"></i>{% trans "送出轉移" %}
            </button>
        </div>
    </form>
</div>

<script>
    $(document).ready(function() {
        // 監聽物品下拉選單的變更事件
        $('#item-select').on('change', function() {
            var ownerId = $(this).find('option:selected').data('owner-id');
            var receiverSelect = $('#receiver-select');
            
            receiverSelect.find('option').prop('disabled', false); //* 1. 先將接收者選單內的所有選項恢復啟用
            
            if (ownerId) {
                receiverSelect.find('option[value="' + ownerId + '"]').prop('disabled', true); //* 2. 如果有抓到 ownerId，將該使用者停用
            }
            
            receiverSelect.select2({ //* 3. 通知 Select2 重新渲染下拉選單狀態
                width: '100%',
                language: "zh-TW"
            });
            
            if (receiverSelect.val() == ownerId) { //* 4. 防呆檢查：如果當前已經選中的接收者剛好被停用，清空目前的值
                receiverSelect.val(null).trigger('change');
            }
        });
    });
</script>
{% endblock %}
