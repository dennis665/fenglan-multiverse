__include__:
  [
    "../dataset/hand_protection.yml",
    "../runtime.yml",
    "../rtdetrv2/include/dataloader.yml",
    "../rtdetrv2/include/optimizer.yml",
    "../rtdetrv2/include/rtdetrv2_r50vd.yml",
  ]

num_classes: 1
output_dir: ./logs/train/rtdetrv2_m_260427_sat

PResNet:
  depth: 34
  freeze_at: -1
  freeze_norm: False
  pretrained: True

HybridEncoder:
  in_channels: [128, 256, 512]
  hidden_dim: 256
  expansion: 0.5

RTDETRTransformerv2:
  num_layers: 4

epoches: 120

optimizer:
  type: AdamW
  params:
    - params: "^(?=.*backbone)(?!.*norm|bn).*$"
      lr: 0.00005
    - params: "^(?=.*backbone)(?=.*norm|bn).*$"
      lr: 0.00005
      weight_decay: 0.
    - params: "^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn|bias)).*$"
      weight_decay: 0.

  lr: 0.0001
  betas: [0.9, 0.999]
  weight_decay: 0.0001

train_dataloader:
  dataset:
    transforms:
      policy:
        epoch: 117
  collate_fn:
    stop_epoch: 117
  total_batch_size: 24
  num_workers: 24