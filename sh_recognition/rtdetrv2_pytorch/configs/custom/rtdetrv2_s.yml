__include__:
  [
    "../dataset/hand_protection.yml",
    "../runtime.yml",
    "../rtdetrv2/include/dataloader.yml",
    "../rtdetrv2/include/optimizer.yml",
    "../rtdetrv2/include/rtdetrv2_r50vd.yml",
  ]

num_classes: 1
output_dir: ./logs/train/rtdetrv2_s_260211_sat

PResNet:
  depth: 18
  freeze_at: -1
  freeze_norm: False
  pretrained: True

HybridEncoder:
  in_channels: [128, 256, 512]
  hidden_dim: 256
  expansion: 0.5

RTDETRTransformerv2:
  num_layers: 3

epoches: 120

optimizer:
  type: AdamW
  params:
    - params: "^(?=.*(?:norm|bn)).*$"
      weight_decay: 0.

train_dataloader:
  dataset:
    # type: UltHandProtectionDataset
    transforms:
      policy:
        epoch: 117
  collate_fn:
    scales: ~
  total_batch_size: 32
  num_workers: 24
