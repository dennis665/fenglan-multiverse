__include__:
  [
    "../dataset/hand_protection.yml",
    "../runtime.yml",
    "../rtdetrv2/include/dataloader.yml",
    "../rtdetrv2/include/optimizer.yml",
    "../rtdetrv2/include/rtdetrv2_r50vd.yml",
  ]

output_dir: ./logs/hand_protection_rtdetrv2_x

PResNet:
  depth: 101

HybridEncoder:
  # intra
  hidden_dim: 384
  dim_feedforward: 2048

RTDETRTransformerv2:
  feat_channels: [384, 384, 384]

optimizer:
  type: AdamW
  params:
    - params: "^(?=.*backbone)(?!.*norm|bn).*$"
      lr: 0.000001
    - params: "^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$"
      weight_decay: 0.

  lr: 0.0001
  betas: [0.9, 0.999]
  weight_decay: 0.0001

train_dataloader:
  total_batch_size: 8
