__include__:
  [
    "../dataset/hand_protection.yml",
    "../runtime.yml",
    "../rtdetrv2/include/dataloader.yml",
    "../rtdetrv2/include/optimizer.yml",
    "../rtdetrv2/include/rtdetrv2_r50vd.yml",
  ]

output_dir: ./logs/hand_protection_rtdetrv2_l

optimizer:
  type: AdamW
  params:
    - params: "^(?=.*backbone)(?!.*norm).*$"
      lr: 0.00001
    - params: "^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$"
      weight_decay: 0.

  lr: 0.0001
  betas: [0.9, 0.999]
  weight_decay: 0.0001
