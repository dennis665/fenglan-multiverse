services:
  db:
    image: mysql:8.0
    container_name: csi_mysql
    restart: always
    environment:
      MYSQL_DATABASE: csi_db
      MYSQL_ROOT_PASSWORD: 78951235
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    container_name: csi_django
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_started

volumes:
  mysql_data: